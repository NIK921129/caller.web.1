<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Call Assistant Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI Call Assistant</h1>
            <nav>
                <a href="/" class="active">Dashboard</a>
                <a href="/settings.html">Settings</a>
                <a href="#">Logs</a> <!-- Still a placeholder -->
            </nav>
        </header>
        
        <main>
            <section class="stats-grid">
                <div class="stat-card">
                    <h3>Total Calls</h3>
                    <p id="total-calls">--</p>
                </div>
                <div class="stat-card">
                    <h3>AI Handled</h3>
                    <p id="ai-handled">--</p>
                </div>
                <div class="stat-card">
                    <h3>Avg Duration</h3>
                    <p id="avg-duration">--:--</p>
                </div>
                <div class="stat-card">
                    <h3>Today</h3>
                    <p id="today-calls">--</p>
                </div>
            </section>
            
            <section class="filters">
                <input type="text" id="search-input" placeholder="Search by caller number...">
                <input type="date" id="date-from">
                <input type="date" id="date-to">
                <select id="status-filter">
                    <option value="all">All</option>
                    <option value="ai_handled">AI Handled</option>
                    <option value="missed">Missed</option>
                    <option value="completed">Completed</option>
                </select>
                <button id="refresh-btn">🔄 Refresh</button>
            </section>
            
            <section class="conversations">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Caller</th>
                            <th>Date & Time</th>
                            <th>Duration</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="conversations-body">
                        <!-- Rows will be rendered by JavaScript -->
                    </tbody>
                </table>
                <button id="load-more-btn" class="load-more" style="display: none;">Load More</button>
            </section>
        </main>
    </div>
    
    <div id="conversation-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="conversation-detail">
                <!-- Conversation details will be rendered here by JavaScript -->
                <h2>Conversation Details</h2>
                <p>Click "View" on a conversation to see the details here.</p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
