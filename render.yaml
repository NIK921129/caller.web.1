# render.yaml
# This file configures the services for your application on Render.

services:
  # ------------------
  # Backend API Service (FastAPI)
  # ------------------
  - type: web
    name: ai-call-assistant-api
    env: python
    region: ohio # Or choose a region closer to you
    plan: free # Or your preferred plan
    rootDir: backend
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app"
    healthCheck:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 30
      timeoutSeconds: 10
    envVars:
      - key: MONGODB_URI
        value: "" # Will be populated from Render secrets
      - key: GEMINI_API_KEY
        value: "" # Will be populated from Render secrets
      - key: TWILIO_ACCOUNT_SID
        value: "" # Will be populated from Render secrets
      - key: TWILIO_AUTH_TOKEN
        value: "" # Will be populated from Render secrets
      - key: TWILIO_PHONE_NUMBER # Your Twilio phone number
        value: "" # Will be populated from Render secrets
      - key: MY_PHONE_NUMBER # Your personal number for call forwarding
        value: "" # Will be populated from Render secrets
      - key: PYTHON_VERSION
        value: 3.11
      - key: MONGODB_DB_NAME
        value: "call_assistant"
      - key: GEMINI_MODEL
        value: "gemini-1.5-flash"
      - key: CALL_TIMEOUT
        value: 20